version: 2
updates:
  - package-ecosystem: "github-actions"
    directories:
      - "/"
      - "/.github/actions/*"
    schedule:
      interval: "weekly"
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      typescript:
        patterns:
          - "*typescript*"
          - "*eslint*"
      jest:
        patterns:
          - "*jest*"
      semantic-release:
        patterns:
          - "*semantic-release*"
